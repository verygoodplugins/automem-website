name = "automem-website"
# pages_build_output_dir is added post-build by scripts/bundle-worker.mjs
# to avoid ASSETS binding conflict during the Cloudflare vite prerender step
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# D1 Database binding for waitlist
[[d1_databases]]
binding = "D1"
database_name = "automem-waitlist"
database_id = "71da6056-2641-488b-a82d-ee44618bfb56"

# D1 Database binding for emdash CMS
[[d1_databases]]
binding = "EMDASH_DB"
database_name = "automem-emdash"
database_id = "46f2fc48-79fe-4fbf-a131-0c392bb59b4e"

# Environment variables (example)
[env.production.vars]
PUBLIC_API_URL = "https://api.automem.ai"
PUBLIC_GITHUB_URL = "https://github.com/verygoodplugins/automem"
# EMAIL_SERVICE_WEBHOOK = "https://your-email-service.com/webhook" # Optional
# PUBLIC_TURNSTILE_SITE_KEY = "" # Optional (set in Pages env)
# TURNSTILE_SECRET_KEY = ""    # Optional (set in Pages env)
# DOUBLE_OPT_IN = "false"
# RESEND_API_KEY = ""
# FROM_EMAIL = "no-reply@automem.ai"
# FROM_NAME = "AutoMem"
# BASE_URL = "https://automem.ai"
# ADMIN_TOKEN = "" # Set in Pages env

[env.preview.vars]
PUBLIC_API_URL = "https://staging-api.automem.ai"
PUBLIC_GITHUB_URL = "https://github.com/verygoodplugins/automem"
