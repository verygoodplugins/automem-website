# Auto-Update Docs
#
# Triggered by source repos (automem, mcp-automem, automem-graph-viewer)
# on release, or manually via workflow_dispatch.
#
# Flow:
# 1. Source repo creates a release via release-please
# 2. release-please.yml dispatches a docs-update event here
# 3. This workflow checks out the source at the release tag
# 4. Claude Code Action reads source changes and updates doc pages
# 5. If changes are needed, Claude creates a PR with a Cloudflare preview
# 6. Docs Auto-Merge queues eligible docs/audit-* PRs after required checks pass

name: Auto-Update Docs
run-name: Auto-Update Docs - ${{ github.event.client_payload.source_repo || inputs.source_repo }} @ ${{ github.event.client_payload.source_sha || inputs.source_sha || 'main' }}

on:
  repository_dispatch:
    types: [docs-update]
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (e.g. verygoodplugins/automem)"
        required: true
        type: choice
        options:
          - verygoodplugins/automem
          - verygoodplugins/mcp-automem
          - verygoodplugins/automem-graph-viewer
      source_sha:
        description: "Commit SHA or tag to document (defaults to main)"
        required: false
      reason:
        description: "What changed and why docs need updating"
        required: true

jobs:
  update-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Validate and resolve source payload
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          SOURCE_REPO="${{ github.event.client_payload.source_repo || inputs.source_repo }}"
          SOURCE_REF="${{ github.event.client_payload.source_sha || inputs.source_sha || 'main' }}"
          REASON="${{ github.event.client_payload.reason || inputs.reason || 'Automated dispatch from source repo release' }}"

          if [ "$SOURCE_REPO" != "verygoodplugins/automem" ] && \
             [ "$SOURCE_REPO" != "verygoodplugins/mcp-automem" ] && \
             [ "$SOURCE_REPO" != "verygoodplugins/automem-graph-viewer" ]; then
            echo "::error::Unsupported source repo: $SOURCE_REPO"
            exit 1
          fi

          # Resolve short SHAs, branch names, and tags to full commit SHAs
          FULL_SHA=$(gh api "repos/$SOURCE_REPO/commits/$SOURCE_REF" -q '.sha') || {
            echo "::error::Could not resolve ref '$SOURCE_REF' in $SOURCE_REPO"
            exit 1
          }

          echo "source_repo=$SOURCE_REPO" >> $GITHUB_OUTPUT
          echo "source_sha=$FULL_SHA" >> $GITHUB_OUTPUT
          echo "reason=$REASON" >> $GITHUB_OUTPUT

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.resolve.outputs.source_repo }}
          ref: ${{ steps.resolve.outputs.source_sha }}
          path: .source-repo
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          branch_prefix: docs/audit-
          prompt: |
            Read the file .github/prompts/update-docs.md for full instructions.

            Source repo: ${{ steps.resolve.outputs.source_repo }}
            Source SHA: ${{ steps.resolve.outputs.source_sha }}
            Base SHA: ${{ github.event.client_payload.base_sha || 'N/A' }}
            Head SHA: ${{ github.event.client_payload.head_sha || steps.resolve.outputs.source_sha }}
            Changed files: ${{ toJSON(github.event.client_payload.changed_files) || 'See reason below' }}
            Affected doc pages: ${{ toJSON(github.event.client_payload.affected_docs) || 'Determine from file-doc-map.json and reason' }}
            Mapping status: ${{ github.event.client_payload.mapping_status || 'matched' }}
            Commit URL: ${{ github.event.client_payload.commit_url || 'N/A' }}
            Compare URL: ${{ github.event.client_payload.compare_url || 'N/A' }}
            Reason: ${{ steps.resolve.outputs.reason }}

            The source repo is checked out at .source-repo/ for you to read.
            For git inspection, use only these allowed forms: `git status --short`, `git --no-pager diff --no-ext-diff`, `git --no-pager log --no-ext-diff`, `git --no-pager show --no-ext-diff`, and `git rev-parse`.
            After making changes, run `npm run build` to verify the site compiles.
          claude_args: >-
            --model claude-sonnet-4-6
            --max-turns 100
            --allowedTools 'Read'
            --allowedTools 'MultiEdit'
            --allowedTools 'Edit'
            --allowedTools 'Write'
            --allowedTools 'Glob'
            --allowedTools 'Grep'
            --allowedTools 'Bash(git status)'
            --allowedTools 'Bash(git status --short:*)'
            --allowedTools 'Bash(git --no-pager diff --no-ext-diff:*)'
            --allowedTools 'Bash(git --no-pager log --no-ext-diff:*)'
            --allowedTools 'Bash(git --no-pager show --no-ext-diff:*)'
            --allowedTools 'Bash(git rev-parse:*)'
            --allowedTools 'Bash(npm run build)'
