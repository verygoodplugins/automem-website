name: Docs Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Normalize and enable auto-merge
    if: >-
      ${{
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'docs/audit-') &&
        startsWith(github.event.pull_request.title, 'docs:') &&
        !github.event.pull_request.draft
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: docs-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Check for unresolved audit notes
        id: guard
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          BODY="$(gh pr view "$PR_URL" --json body --jq '.body // ""')"
          if echo "$BODY" | grep -Eiq 'follow-up questions|open question|not addressed|maintainer input|needs maintainer|unresolved'; then
            echo "PR body contains unresolved audit language; leaving it for maintainer review."
            echo "eligible=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "eligible=true" >> "$GITHUB_OUTPUT"

      - name: Enable auto-merge for eligible docs PR
        if: steps.guard.outputs.eligible == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PR_JSON="$(gh pr view "$PR_URL" --json state,isDraft,autoMergeRequest)"
          PR_STATE="$(echo "$PR_JSON" | jq -r '.state')"
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR is $PR_STATE; auto-merge is no longer needed."
            exit 0
          fi

          IS_DRAFT="$(echo "$PR_JSON" | jq -r '.isDraft')"
          if [ "$IS_DRAFT" = "true" ]; then
            echo "PR is still a draft; skipping auto-merge (the ready_for_review event will handle it)."
            exit 0
          fi

          AUTO_MERGE_ENABLED="$(echo "$PR_JSON" | jq -r '.autoMergeRequest != null')"
          if [ "$AUTO_MERGE_ENABLED" = "true" ]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi

          gh pr merge "$PR_URL" --auto --squash --match-head-commit "$HEAD_SHA"
