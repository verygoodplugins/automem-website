name: Docs Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    name: Normalize and enable auto-merge
    if: >-
      ${{
        github.event.pull_request.base.ref == 'main' &&
        github.event.pull_request.head.repo.full_name == github.repository &&
        startsWith(github.event.pull_request.head.ref, 'docs/audit-') &&
        startsWith(github.event.pull_request.title, 'docs:')
      }}
    runs-on: ubuntu-latest
    concurrency:
      group: docs-auto-merge-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Mark eligible docs PR ready
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          if [ "$(gh pr view "$PR_URL" --json isDraft --jq '.isDraft')" = "true" ]; then
            gh pr ready "$PR_URL"
          else
            echo "PR is already ready for review."
          fi

      - name: Enable auto-merge for eligible docs PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN || github.token }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          PR_STATE="$(gh pr view "$PR_URL" --json state --jq '.state')"
          if [ "$PR_STATE" != "OPEN" ]; then
            echo "PR is $PR_STATE; auto-merge is no longer needed."
            exit 0
          fi

          AUTO_MERGE_ENABLED="$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest != null')"
          if [ "$AUTO_MERGE_ENABLED" = "true" ]; then
            echo "Auto-merge is already enabled."
            exit 0
          fi

          gh pr merge "$PR_URL" --auto --squash --match-head-commit "$HEAD_SHA"
