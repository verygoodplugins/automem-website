<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2D2B28"/>
  
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E3A857;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#5C9FD8;stop-opacity:0.15" />
    </linearGradient>
    
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E3A857" />
      <stop offset="100%" style="stop-color:#5C9FD8" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#grad1)"/>
  
  <!-- Robot Icon (centered top) -->
  <g transform="translate(550, 120)">
    <rect x="10" y="20" width="80" height="60" rx="10" fill="none" stroke="#E3A857" stroke-width="8"/>
    <rect x="20" y="30" width="60" height="40" rx="4" fill="#F5F3EF"/>
    <rect x="32" y="42" width="8" height="12" rx="4" fill="#E3A857"/>
    <rect x="54" y="42" width="8" height="12" rx="4" fill="#E3A857"/>
    <path d="M 50 10 L 50 20 L 40 20" fill="none" stroke="#E3A857" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="50" r="8" fill="#E3A857"/>
    <circle cx="100" cy="50" r="8" fill="#E3A857"/>
  </g>
  
  <!-- Main Title -->
  <text x="600" y="320" font-family="Arial, Helvetica, sans-serif" font-size="96" font-weight="700" text-anchor="middle" fill="url(#textGrad)">
    automem.ai
  </text>
  
  <!-- Tagline -->
  <text x="600" y="390" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="500" text-anchor="middle" fill="#F5F3EF" opacity="0.9">
    Deploy once, remember everywhere
  </text>
  
  <!-- Sub-tagline -->
  <text x="600" y="450" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" text-anchor="middle" fill="#9B9996">
    Universal memory layer for AI assistants
  </text>
  
  <!-- Feature badges -->
  <g transform="translate(280, 500)">
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#3A3734" opacity="0.8"/>
    <text x="90" y="30" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#E3A857">
      MCP Compatible
    </text>
  </g>
  
  <g transform="translate(510, 500)">
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#3A3734" opacity="0.8"/>
    <text x="90" y="30" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#5C9FD8">
      Graph-Based
    </text>
  </g>
  
  <g transform="translate(740, 500)">
    <rect x="0" y="0" width="180" height="45" rx="8" fill="#3A3734" opacity="0.8"/>
    <text x="90" y="30" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="600" text-anchor="middle" fill="#4AA181">
      $5/month
    </text>
  </g>
</svg>

