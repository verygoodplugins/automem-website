<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="diskGold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE082"/>
      <stop offset="50%" style="stop-color:#F9D857"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F9D857"/>
      <stop offset="100%" style="stop-color:#FFE082"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <g opacity="0.15">
    <circle cx="100" cy="100" r="200" fill="none" stroke="#F9D857" stroke-width="1"/>
    <circle cx="1100" cy="530" r="150" fill="none" stroke="#5B21B6" stroke-width="1"/>
    <circle cx="900" cy="150" r="100" fill="none" stroke="#34D399" stroke-width="1"/>
  </g>
  
  <g transform="translate(500, 80)">
    <rect x="0" y="0" width="200" height="200" rx="20" fill="url(#diskGold)" stroke="#1a1a1a" stroke-width="6" filter="url(#glow)"/>
    <rect x="50" y="20" width="100" height="60" rx="8" fill="#e5e5e5" stroke="#1a1a1a" stroke-width="4"/>
    <rect x="110" y="32" width="30" height="38" rx="4" fill="#1a1a1a"/>
    <circle cx="70" cy="130" r="16" fill="#1a1a1a"/>
    <circle cx="130" cy="130" r="16" fill="#1a1a1a"/>
    <path d="M80 165 Q100 185 120 165" stroke="#1a1a1a" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="40" cy="145" r="12" fill="#ff9999" opacity="0.6"/>
    <circle cx="160" cy="145" r="12" fill="#ff9999" opacity="0.6"/>
  </g>
  
  <text x="600" y="360" font-family="'JetBrains Mono', monospace" font-size="72" font-weight="700" text-anchor="middle" fill="url(#titleGrad)">
    AutoMem
  </text>
  
  <text x="600" y="420" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="500" text-anchor="middle" fill="#f5f5f5" opacity="0.9">
    Recall is Power.
  </text>
  
  <text x="600" y="470" font-family="'JetBrains Mono', monospace" font-size="24" font-weight="400" text-anchor="middle" fill="#737373">
    Universal memory layer for AI agents
  </text>
  
  <g transform="translate(280, 520)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#1a1a1a" stroke="#F9D857" stroke-width="2"/>
    <text x="80" y="27" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="600" text-anchor="middle" fill="#F9D857">
      MCP Compatible
    </text>
  </g>
  
  <g transform="translate(480, 520)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#1a1a1a" stroke="#5B21B6" stroke-width="2"/>
    <text x="80" y="27" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="600" text-anchor="middle" fill="#a78bfa">
      Graph-Based
    </text>
  </g>
  
  <g transform="translate(680, 520)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#1a1a1a" stroke="#34D399" stroke-width="2"/>
    <text x="80" y="27" font-family="'JetBrains Mono', monospace" font-size="16" font-weight="600" text-anchor="middle" fill="#34D399">
      Open Source
    </text>
  </g>
  
  <text x="600" y="610" font-family="'JetBrains Mono', monospace" font-size="18" text-anchor="middle" fill="#737373">
    automem.ai
  </text>
</svg>