<svg viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img" aria-labelledby="amb-eff-title amb-eff-desc">
  <title id="amb-eff-title">Bounded retrieval: context tokens fed to the answerer</title>
  <desc id="amb-eff-desc">Horizontal bar chart comparing mean context tokens fed to the answerer on the BEAM benchmark. AutoMem feeds a bounded mean of about 3,900 tokens, holding flat across all haystack scales from 100k to 10M. The board leader feeds a range of 17,000 to 27,000 tokens. AutoMem's retrieval is architecturally bounded rather than scaling with context.</desc>
  <defs>
    <style>
      .bg { fill: #ffffff; stroke: #d3dae4; stroke-width: 1; }
      .ink { fill: #0e141c; }
      .sub { fill: #556274; }
      .grid { stroke: #e3e8ef; stroke-width: 1; }
      .axis0 { stroke: #aab4c2; stroke-width: 1; }
      .tick { fill: #7c8696; }
      .am { fill: #0f7a50; }
      .leader { fill: #c85a2a; }
      .leader-edge { stroke: #8f3c1c; stroke-width: 2; }
      .leader-on { fill: #fbeee7; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #0f161e; stroke: #465260; }
        .ink { fill: #eff4f9; }
        .sub { fill: #9ea9b8; }
        .grid { stroke: #243140; }
        .axis0 { stroke: #465260; }
        .tick { fill: #9ea9b8; }
        .am { fill: #4fdf69; }
        .leader { fill: #e0a45a; }
        .leader-edge { stroke: #b06a2a; }
        .leader-on { fill: #2a1a0c; }
      }
    </style>
  </defs>

  <rect class="bg" x="1" y="1" width="758" height="358" rx="10"/>

  <text class="ink" x="40" y="42" font-size="21" font-weight="600">Bounded retrieval: context tokens fed to the answerer</text>
  <text class="sub" x="40" y="66" font-size="13">Mean context per query on BEAM (AMB avg_context_tokens). Lower is leaner.</text>

  <line class="axis0" x1="160" y1="96" x2="160" y2="262"/>
  <line class="grid" x1="295" y1="96" x2="295" y2="262"/>
  <line class="grid" x1="430" y1="96" x2="430" y2="262"/>
  <line class="grid" x1="565" y1="96" x2="565" y2="262"/>
  <line class="grid" x1="700" y1="96" x2="700" y2="262"/>

  <g class="tick" font-size="11" text-anchor="middle">
    <text x="160" y="282">0</text>
    <text x="295" y="282">7.5k</text>
    <text x="430" y="282">15k</text>
    <text x="565" y="282">22.5k</text>
    <text x="700" y="282">30k</text>
  </g>
  <text class="sub" x="430" y="304" font-size="11" text-anchor="middle">context tokens fed to the answerer</text>

  <text class="ink" x="148" y="142" font-size="13" font-weight="600" text-anchor="end">AutoMem</text>
  <text class="sub" x="148" y="159" font-size="11" text-anchor="end">bounded, all scales</text>
  <rect class="am" x="160" y="124" width="70" height="34" rx="4"/>
  <text class="am" x="240" y="146" font-size="13" font-weight="700">~3.9k</text>

  <text class="ink" x="148" y="216" font-size="13" font-weight="600" text-anchor="end">Board leader</text>
  <text class="sub" x="148" y="233" font-size="11" text-anchor="end">on BEAM</text>
  <rect class="leader" x="466" y="198" width="180" height="34" rx="4"/>
  <line class="leader-edge" x1="466" y1="198" x2="466" y2="232"/>
  <line class="leader-edge" x1="646" y1="198" x2="646" y2="232"/>
  <text class="leader-on" x="556" y="220" font-size="13" font-weight="700" text-anchor="middle">17k&#8211;27k</text>

  <line class="grid" x1="40" y1="324" x2="720" y2="324"/>
  <text class="sub" x="40" y="346" font-size="12">AutoMem holds a flat ~3.9k mean from 100k to 10M tokens &#8212; retrieval is architecturally bounded, not context-stuffed.</text>
</svg>
